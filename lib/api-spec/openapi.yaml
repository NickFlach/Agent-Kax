openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KAX - Kannaka Artifact Exchange API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: admin
    description: Admin user management
  - name: artifacts
    description: Artifact management
  - name: drops
    description: Drop management
  - name: harvester
    description: Artifact harvesting from OpenBotCity
  - name: storefront
    description: Public storefront endpoints
  - name: dashboard
    description: Dashboard summaries
  - name: agents
    description: OpenBotCity agent onboarding and per-agent dashboards

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /admin/users:
    get:
      tags: [admin]
      operationId: listAdminUsers
      summary: List all users (admin only)
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAdminUsersResponse'

  /admin/users/{id}:
    patch:
      tags: [admin]
      operationId: updateAdminUser
      summary: Update a user's role or disabled status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminUserBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents owned by the current user (or all for admins)
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Register an OpenBotCity agent by slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent slug not found on OpenBotCity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Agent already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /agents/{slug}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get an agent dashboard
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDashboard"

  /agents/{slug}/harvest:
    post:
      operationId: harvestAgent
      tags: [agents]
      summary: Run a partner harvest for a single agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HarvestAgentBody"
      responses:
        "200":
          description: Harvest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarvesterResult"

  /artifacts:
    get:
      operationId: listArtifacts
      tags: [artifacts]
      summary: List all artifacts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [raw, scored, narrated, dropped]
        - name: minScore
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: artifactType
          in: query
          schema:
            type: string
            enum: [image, audio, music, text, furniture]
        - name: editionType
          in: query
          schema:
            type: string
            enum: [open, limited, "1_of_1"]
        - name: agentId
          in: query
          schema:
            type: integer
        - name: all
          in: query
          description: Admin only. When `true`, returns data across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListResponse"

  /artifacts/{id}:
    get:
      operationId: getArtifact
      tags: [artifacts]
      summary: Get artifact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/score:
    post:
      operationId: scoreArtifact
      tags: [artifacts]
      summary: Run taste engine scoring on an artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scored artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/narrate:
    post:
      operationId: narrateArtifact
      tags: [artifacts]
      summary: Generate narrative for an artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Narrated artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /drops:
    get:
      operationId: listDrops
      tags: [drops]
      summary: List all drops
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, sold]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: all
          in: query
          description: Admin only. When `true`, returns data across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: List of drops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropListResponse"
    post:
      operationId: createDrop
      tags: [drops]
      summary: Create a new drop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDropBody"
      responses:
        "201":
          description: Drop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"

  /drops/{id}:
    get:
      operationId: getDrop
      tags: [drops]
      summary: Get drop by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drop details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"
    patch:
      operationId: updateDrop
      tags: [drops]
      summary: Update a drop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDropBody"
      responses:
        "200":
          description: Drop updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"
    delete:
      operationId: deleteDrop
      tags: [drops]
      summary: Delete a drop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Drop deleted

  /drops/{id}/publish:
    post:
      operationId: publishDrop
      tags: [drops]
      summary: Publish a drop to the storefront
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drop published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"

  /drops/suggestions:
    get:
      operationId: getDropSuggestions
      tags: [drops]
      summary: Suggest drop bundles based on scarcity (limited-edition artifacts grouped by creator)
      responses:
        "200":
          description: Suggested drop bundles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropSuggestionsResponse"

  /drops/{dropId}/artifacts:
    post:
      operationId: addArtifactToDrop
      tags: [drops]
      summary: Add an artifact to a drop
      parameters:
        - name: dropId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddArtifactToDropBody"
      responses:
        "200":
          description: Artifact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"
        "409":
          description: Open-edition artifact rejected by scarce drop (pass force=true to override)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /drops/{dropId}/artifacts/{artifactId}:
    delete:
      operationId: removeArtifactFromDrop
      tags: [drops]
      summary: Remove an artifact from a drop
      parameters:
        - name: dropId
          in: path
          required: true
          schema:
            type: integer
        - name: artifactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Artifact removed

  /harvester/run:
    post:
      operationId: runHarvester
      tags: [harvester]
      summary: Trigger artifact harvesting from OpenBotCity
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HarvesterRunBody"
      responses:
        "200":
          description: Harvesting results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarvesterResult"

  /storefront/drops:
    get:
      operationId: getStorefrontDrops
      tags: [storefront]
      summary: Get published drops for the storefront
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Published drops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropListResponse"

  /storefront/drops/{id}:
    get:
      operationId: getStorefrontDrop
      tags: [storefront]
      summary: Get a single published drop for storefront
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published drop detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"

  /storefront/featured:
    get:
      operationId: getStorefrontFeatured
      tags: [storefront]
      summary: Get featured artifacts for the storefront hero
      responses:
        "200":
          description: Featured artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedResponse"

  /agents/{slug}/storefront/settings:
    get:
      operationId: getAgentStorefrontSettings
      tags: [agents]
      summary: Get the storefront customization for an agent (owner or admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Storefront settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStorefrontSettings"
    put:
      operationId: updateAgentStorefrontSettings
      tags: [agents]
      summary: Update the storefront customization for an agent (owner or admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentStorefrontSettingsBody"
      responses:
        "200":
          description: Updated storefront settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStorefrontSettings"

  /storefront/by-agent/{slug}:
    get:
      operationId: getAgentStorefront
      tags: [storefront]
      summary: Public per-agent storefront landing data
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Storefront landing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStorefrontLanding"

  /storefront/by-agent/{slug}/drops:
    get:
      operationId: getAgentStorefrontDrops
      tags: [storefront]
      summary: Published drops for an agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Drops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropListResponse"

  /storefront/by-agent/{slug}/drops/{id}:
    get:
      operationId: getAgentStorefrontDrop
      tags: [storefront]
      summary: A published drop for an agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview stats
      parameters:
        - name: all
          in: query
          description: Admin only. When `true`, aggregates across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: all
          in: query
          description: Admin only. When `true`, aggregates across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityFeed"

  /dashboard/partner-sync:
    get:
      operationId: getPartnerSyncStatus
      tags: [dashboard]
      summary: Partner API sync status widget
      responses:
        "200":
          description: Partner sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerSyncStatus"

  /dashboard/score-distribution:
    get:
      operationId: getScoreDistribution
      tags: [dashboard]
      summary: Get distribution of artifact scores
      parameters:
        - name: all
          in: query
          description: Admin only. When `true`, aggregates across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: Score distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreDistribution"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        displayName:
          type: [string, 'null']
        role:
          type: string
          enum: [user, admin]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AdminUser:
      type: object
      required: [id, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        displayName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        bio:
          type: [string, 'null']
        role:
          type: string
          enum: [user, admin]
        disabledAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
    ListAdminUsersResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/AdminUser'
    UpdateAdminUserBody:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
        disabled:
          type: boolean

    Artifact:
      type: object
      properties:
        id:
          type: integer
        externalId:
          type: string
        title:
          type: string
        creatorName:
          type: string
        publicUrl:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        reactionCount:
          type: integer
        artifactType:
          type: string
          enum: [image, music, text, audio, furniture]
        status:
          type: string
          enum: [raw, scored, narrated, dropped]
        kannakaScore:
          type: number
          nullable: true
        rarityScore:
          type: number
          nullable: true
        narrative:
          type: string
          nullable: true
        narrativeTitle:
          type: string
          nullable: true
        transmissionId:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        ingestedAt:
          type: string
          format: date-time
        scoredAt:
          type: string
          format: date-time
          nullable: true
        narratedAt:
          type: string
          format: date-time
          nullable: true
        dropId:
          type: integer
          nullable: true
        ownerId:
          type: string
          nullable: true
        obcArtifactUuid:
          type: string
          nullable: true
        agentId:
          type: integer
          nullable: true
        editionType:
          type: string
          enum: [open, limited, "1_of_1"]
        editionTotal:
          type: integer
          nullable: true
        editionSerial:
          type: integer
          nullable: true
        scoreBreakdown:
          type: object
          nullable: true
          properties:
            reactionSignal:
              type: number
            novelty:
              type: number
            exploration:
              type: number
            baseScore:
              type: number
            scarcityMultiplier:
              type: number
            editionType:
              type: string
            finalScore:
              type: number
          required:
            - reactionSignal
            - novelty
            - exploration
            - baseScore
            - scarcityMultiplier
            - editionType
            - finalScore
      required:
        - id
        - externalId
        - title
        - creatorName
        - publicUrl
        - reactionCount
        - artifactType
        - status
        - tags
        - ingestedAt
        - editionType

    ArtifactListResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        total:
          type: integer
      required:
        - artifacts
        - total

    Drop:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        dropType:
          type: string
          enum: [single, collection, bundle]
        status:
          type: string
          enum: [draft, published, sold]
        price:
          type: number
          nullable: true
        isScarce:
          type: boolean
        ownerId:
          type: string
          nullable: true
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        createdAt:
          type: string
          format: date-time
        publishedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title
        - dropType
        - status
        - artifacts
        - createdAt

    DropListResponse:
      type: object
      properties:
        drops:
          type: array
          items:
            $ref: "#/components/schemas/Drop"
        total:
          type: integer
      required:
        - drops
        - total

    CreateDropBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        dropType:
          type: string
          enum: [single, collection, bundle]
        price:
          type: number
        isScarce:
          type: boolean
        artifactIds:
          type: array
          items:
            type: integer
      required:
        - title
        - dropType

    UpdateDropBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        isScarce:
          type: boolean
        status:
          type: string
          enum: [draft, published, sold]

    AddArtifactToDropBody:
      type: object
      properties:
        artifactId:
          type: integer
        force:
          type: boolean
      required:
        - artifactId

    DropSuggestion:
      type: object
      required: [creatorName, artifactCount, totalReactions, artifacts]
      properties:
        creatorName:
          type: string
        artifactCount:
          type: integer
        totalReactions:
          type: integer
        averageScore:
          type: number
          nullable: true
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"

    DropSuggestionsResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/DropSuggestion"

    HarvesterRunBody:
      type: object
      properties:
        type:
          type: string
          enum: [image, audio, text, music, furniture, all]
          default: image
        limit:
          type: integer
          default: 20
        minReactions:
          type: integer
          default: 0
        creator:
          type: string
        keyword:
          type: string
        agentId:
          type: integer
          description: Required when the partner API is configured; chooses which agent to harvest.

    Agent:
      type: object
      required: [id, slug, displayName, ownerId, artifactsHarvested, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: [string, "null"]
        ownerId:
          type: string
        artifactsHarvested:
          type: integer
        lastSyncAt:
          type: [string, "null"]
          format: date-time
        lastArtifactCursor:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    AgentListResponse:
      type: object
      required: [agents]
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"

    CreateAgentBody:
      type: object
      required: [slug]
      properties:
        slug:
          type: string
          minLength: 1
        displayName:
          type: string

    AgentDashboard:
      type: object
      required: [agent, stats, metrics, recentArtifacts]
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        stats:
          type: object
          required: [totalArtifacts, scoredArtifacts, narratedArtifacts, droppedArtifacts]
          properties:
            totalArtifacts:
              type: integer
            scoredArtifacts:
              type: integer
            narratedArtifacts:
              type: integer
            droppedArtifacts:
              type: integer
        metrics:
          type: object
          required: [averageScore, scarcityMix]
          properties:
            averageScore:
              type: [number, "null"]
            scarcityMix:
              type: object
              required: [open, limited, oneOfOne]
              properties:
                open:
                  type: integer
                limited:
                  type: integer
                oneOfOne:
                  type: integer
        recentArtifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"

    AgentStorefrontSettings:
      type: object
      required: [agentId, themeVariant]
      properties:
        agentId:
          type: integer
        displayName:
          type: [string, "null"]
        tagline:
          type: [string, "null"]
        heroImageUrl:
          type: [string, "null"]
        accentColor:
          type: [string, "null"]
          description: Hex color like `#7C3AED`
        themeVariant:
          type: string
          enum: [dark, light]
        socialLinks:
          type: [object, "null"]
          additionalProperties:
            type: string
        customDomainHint:
          type: [string, "null"]
        customCssVars:
          type: [object, "null"]
          description: Allowlisted CSS variables (e.g. `--background`, `--foreground`, `--accent`).
          additionalProperties:
            type: string

    UpdateAgentStorefrontSettingsBody:
      type: object
      properties:
        displayName:
          type: [string, "null"]
        tagline:
          type: [string, "null"]
        heroImageUrl:
          type: [string, "null"]
        accentColor:
          type: [string, "null"]
        themeVariant:
          type: string
          enum: [dark, light]
        socialLinks:
          type: [object, "null"]
          additionalProperties:
            type: string
        customDomainHint:
          type: [string, "null"]
        customCssVars:
          type: [object, "null"]
          additionalProperties:
            type: string

    AgentStorefrontLanding:
      type: object
      required: [agent, settings, featured]
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        settings:
          $ref: "#/components/schemas/AgentStorefrontSettings"
        featured:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        latestDrop:
          $ref: "#/components/schemas/Drop"

    HarvestAgentBody:
      type: object
      properties:
        type:
          type: string
          enum: [image, audio, text, music, furniture, all]
        limit:
          type: integer
          default: 25

    HarvesterResult:
      type: object
      properties:
        harvested:
          type: integer
        newArtifacts:
          type: integer
        duplicates:
          type: integer
        paired:
          type: integer
      required:
        - harvested
        - newArtifacts
        - duplicates

    FeaturedResponse:
      type: object
      properties:
        featured:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        latestDrop:
          $ref: "#/components/schemas/Drop"
      required:
        - featured

    DashboardSummary:
      type: object
      properties:
        totalArtifacts:
          type: integer
        scoredArtifacts:
          type: integer
        narratedArtifacts:
          type: integer
        totalDrops:
          type: integer
        publishedDrops:
          type: integer
        averageScore:
          type: number
        topCreators:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
      required:
        - totalArtifacts
        - scoredArtifacts
        - narratedArtifacts
        - totalDrops
        - publishedDrops
        - averageScore
        - topCreators

    ActivityFeed:
      type: object
      properties:
        activities:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              type:
                type: string
                enum: [harvested, scored, narrated, dropped, published]
              message:
                type: string
              artifactTitle:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
            required:
              - id
              - type
              - message
              - timestamp
      required:
        - activities

    PartnerSyncStatus:
      type: object
      required:
        - apiKeyConfigured
        - webhookSubscribed
        - lastPollAt
        - lastWebhookAt
        - requestsToday
        - dailyBudget
      properties:
        apiKeyConfigured:
          type: boolean
        webhookSubscribed:
          type: string
        lastPollAt:
          type: [string, 'null']
          format: date-time
        lastWebhookAt:
          type: [string, 'null']
          format: date-time
        lastEventUuid:
          type: [string, 'null']
        lastArtifactCursor:
          type: [string, 'null']
        requestsToday:
          type: integer
        dailyBudget:
          type: integer

    ScoreDistribution:
      type: object
      properties:
        buckets:
          type: array
          items:
            type: object
            properties:
              range:
                type: string
              count:
                type: integer
            required:
              - range
              - count
      required:
        - buckets
