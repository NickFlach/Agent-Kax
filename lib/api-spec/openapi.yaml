              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        displayName:
          type: [string, 'null']
        role:
          type: string
          enum: [user, admin]
        notificationPrefs:
          $ref: '#/components/schemas/NotificationPrefs'
        walletAddress:
          type: [string, 'null']
          description: Lowercased EVM address if user signed in via wallet
        provider:
          type: [string, 'null']
          description: Auth provider for the active session (wallet, obc_agent, email)
        hasPassword:
          type: boolean
          description: True if the account has an email password set (email door usable)
    EmailRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: 8-128 characters. Capped to bound scrypt CPU cost.
        displayName:
          type: [string, 'null']
          maxLength: 80
    EmailLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 128
    LinkEmailRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 128
    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
    PasswordResetConfirmBody:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 256
          description: Single-use token from the reset email
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
          description: 8-128 characters. Capped to bound scrypt CPU cost.
    PasswordResetAcceptedResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    AuthMethodsResponse:
      type: object
      required: [email, walletAddress, hasPassword]
      properties:
        email:
          type: [string, 'null']
        walletAddress:
          type: [string, 'null']
        hasPassword:
          type: boolean
    WalletNonceRequest:
      type: object
      required: [address]
      properties:
        address:
          type: string
          description: EVM address (any case) the wallet will sign with
    WalletNonceResponse:
      type: object
      required: [nonce, message, expiresAt]
      properties:
        nonce:
          type: string
        message:
          type: string
          description: Human-readable SIWE-style message to sign with personal_sign
        expiresAt:
          type: string
          format: date-time
    WalletVerifyRequest:
      type: object
      required: [address, signature, nonce]
      properties:
        address:
          type: string
        signature:
          type: string
          description: 65-byte hex signature (0x + 130 chars) over the canonical SIWE message the server issued at /auth/wallet/nonce
        nonce:
          type: string
          description: The nonce returned by /auth/wallet/nonce. The server rebuilds the canonical message from this and ignores any client-supplied message text.
    AgentChallengeRequest:
      type: object
      required: [obcBotId]
      properties:
        obcBotId:
          type: string
    AgentChallengeResponse:
      type: object
      required: [challenge, expiresAt, instruction]
      properties:
        challenge:
          type: string
          description: Verification phrase the user must publish from their OBC bot
        expiresAt:
          type: string
          format: date-time
        instruction:
          type: string
          description: Human-readable instructions for completing the challenge
    AgentVerifyRequest:
      type: object
      required: [obcBotId, artifactUuid]
      properties:
        obcBotId:
          type: string
        artifactUuid:
          type: string
    UserBot:
      type: object
      required: [id, obcBotId, displayName, attachedAt]
      properties:
        id:
          type: string
        obcBotId:
          type: string
        displayName:
          type: [string, 'null']
        attachedAt:
          type: string
          format: date-time
    UserBotsResponse:
      type: object
      required: [bots]
      properties:
        bots:
          type: array
          items:
            $ref: '#/components/schemas/UserBot'
    AgentVerifyResponse:
      type: object
      required: [ok, bots]
      properties:
        ok:
          type: boolean
        bots:
          type: array
          items:
            $ref: '#/components/schemas/UserBot'
    DetachUserBotResponse:
      type: object
      required: [ok, detached]
      properties:
        ok:
          type: boolean
        detached:
          type: string
          description: OBC bot UUID that was detached
    NftMetadata:
      type: object
      required: [name, description, image, attributes]
      properties:
        name:
          type: string
        description:
          type: string
        image:
          type: string
        external_url:
          type: string
        attributes:
          type: array
          items:
            type: object
            required: [trait_type, value]
            properties:
              trait_type:
                type: string
              value:
                oneOf:
                  - type: string
                  - type: number
              display_type:
                type: string
    NftMint:
      type: object
      required: [id, artifactId, chainId, contractAddress, tokenId, txHash, mintedToAddress, mintedAt]
      properties:
        id:
          type: integer
        artifactId:
          type: integer
        chainId:
          type: integer
        contractAddress:
          type: string
        tokenId:
          type: string
        txHash:
          type: string
        mintedToAddress:
          type: string
        metadataUri:
          type: string
          nullable: true
        mintedAt:
          type: string
          format: date-time
    ArtifactMintState:
      type: object
      required: [artifactId, editionType, metadataUri]
      properties:
        artifactId:
          type: integer
        editionType:
          type: string
          enum: [open, limited, "1_of_1"]
        metadataUri:
          type: string
        mint:
          allOf:
            - $ref: '#/components/schemas/NftMint'
          nullable: true
    RecordMintBody:
      type: object
      required: [chainId, contractAddress, tokenId, txHash, mintedToAddress]
      properties:
        chainId:
          type: integer
        contractAddress:
          type: string
        tokenId:
          type: string
        txHash:
          type: string
        mintedToAddress:
          type: string
