openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KAX - Kannaka Artifact Exchange API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: admin
    description: Admin user management
  - name: artifacts
    description: Artifact management
  - name: drops
    description: Drop management
  - name: harvester
    description: Artifact harvesting from OpenBotCity
  - name: storefront
    description: Public storefront endpoints
  - name: floor
    description: The physical KAX floor in OpenBotCity (Market District) and its witnessed-deal ledger
  - name: dashboard
    description: Dashboard summaries
  - name: agents
    description: OpenBotCity agent onboarding and per-agent dashboards
  - name: inbox
    description: Partner-driven proposals, DMs, and matches
  - name: nft
    description: 1-of-1 NFT minting + token metadata
  - name: marketplace
    description: Unified marketplace surface combining OBC storefronts and constellation agents
  - name: constellation
    description: Read-only mirror of the Kannaka constellation NATS bus
  - name: connectors
    description: Pluggable agentic-platform connector registry

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/wallet/nonce:
    post:
      tags: [Auth]
      operationId: createWalletNonce
      summary: Mint a single-use SIWE-style nonce for wallet sign-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletNonceRequest'
      responses:
        '200':
          description: Nonce minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletNonceResponse'
  /auth/wallet/verify:
    post:
      tags: [Auth]
      operationId: verifyWalletSignature
      summary: Verify a wallet signature and open a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletVerifyRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Bad signature, expired nonce, or address mismatch
  /auth/email/register:
    post:
      tags: [Auth]
      operationId: registerWithEmail
      summary: Create an account with email + password and open a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRegisterRequest'
      responses:
        '200':
          description: Registered and signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Invalid email or password (min 8 characters)
        '409':
          description: Email already registered
        '429':
          description: Too many registration attempts — try again later
  /auth/email/login:
    post:
      tags: [Auth]
      operationId: loginWithEmail
      summary: Sign in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailLoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Invalid email or password (deliberately generic)
        '403':
          description: Account disabled
        '429':
          description: Too many attempts — try again later
  /auth/email/reset-request:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      summary: Request a password-reset email
      description: |
        Always answers 200 with the same body whether or not the email
        exists — the response never reveals account existence (same
        anti-enumeration posture as login). If the email belongs to an
        account with a password set, a single-use reset link (30 min
        TTL) is emailed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '200':
          description: Accepted (whether or not the account exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetAcceptedResponse'
        '400':
          description: Invalid email
        '429':
          description: Too many reset requests — try again later
  /auth/email/reset-confirm:
    post:
      tags: [Auth]
      operationId: confirmPasswordReset
      summary: Set a new password using a reset token
      description: |
        Consumes the single-use token from the reset email and updates
        the account's password hash. The token is invalidated whether
        the attempt succeeds or fails downstream, and all other
        outstanding reset tokens for the account are voided on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmBody'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetAcceptedResponse'
        '400':
          description: Invalid, expired, or already-used token, or bad password
        '429':
          description: Too many attempts — try again later
  /auth/link/wallet:
    post:
      tags: [Auth]
      operationId: linkWallet
      summary: Link a wallet to the signed-in account
      description: |
        The client first mints a nonce at /auth/wallet/nonce and signs the
        returned message. This endpoint verifies the proof exactly like
        /auth/wallet/verify but attaches the address to the CURRENT
        signed-in account instead of opening a new session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletVerifyRequest'
      responses:
        '200':
          description: Wallet linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMethodsResponse'
        '401':
          description: Auth required, or bad signature / expired nonce
        '409':
          description: Address already linked to another account, or this account already has a wallet
  /auth/link/email:
    post:
      tags: [Auth]
      operationId: linkEmail
      summary: Set an email + password on the signed-in account
      description: |
        Lets a wallet-first user add the email door to their existing
        account. Fails 409 if the email belongs to another account or a
        password is already set (password change is out of scope).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkEmailRequest'
      responses:
        '200':
          description: Email + password set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMethodsResponse'
        '400':
          description: Invalid email or password (min 8 characters)
        '401':
          description: Auth required
        '409':
          description: Email already in use, password already set, or account has a different email
  /auth/agent/challenge:
    post:
      tags: [Auth]
      operationId: createAgentChallenge
      summary: Mint a verification phrase the user must publish from an OBC bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChallengeRequest'
      responses:
        '200':
          description: Challenge minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChallengeResponse'
        '401':
          description: Auth required
        '409':
          description: Bot already attached to another account
  /auth/agent/verify:
    post:
      tags: [Auth]
      operationId: verifyAgentChallenge
      summary: Confirm the verification artifact and attach the OBC bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentVerifyRequest'
      responses:
        '200':
          description: Bot attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVerifyResponse'
        '400':
          description: Verification failed (bad UUID format)
        '401':
          description: No active challenge or auth required
        '403':
          description: Creator mismatch, missing phrase, or pre-dated artifact
        '404':
          description: Artifact not found on partner API
        '409':
          description: Bot already attached to a different account
        '502':
          description: Partner API error
  /auth/bots:
    get:
      tags: [Auth]
      operationId: listUserBots
      summary: List OBC bots attached to the current user
      responses:
        '200':
          description: Bot list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBotsResponse'
        '401':
          description: Auth required
  /auth/bots/{botId}:
    delete:
      tags: [Auth]
      operationId: detachUserBot
      summary: Detach an OBC bot from the current user
      description: |
        `botId` is the OBC bot UUID (the same value returned as `obcBotId` from
        `GET /auth/bots`), not the internal `user_bots.id` row id.
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
            description: OBC bot UUID
      responses:
        '200':
          description: Detached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetachUserBotResponse'
        '400':
          description: Invalid bot UUID
        '401':
          description: Auth required
        '404':
          description: Bot not attached to this user
  /me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Alias of /auth/user returning the current authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /me/notification-prefs:
    patch:
      tags: [Auth]
      operationId: updateNotificationPrefs
      summary: Update the current user's notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationPrefsBody'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPrefs'
  /nft/metadata/{artifactId}.json:
    get:
      tags: [nft]
      operationId: getNftMetadata
      summary: ERC-721 metadata document for an artifact
      description: Public JSON metadata served at the URL embedded in the on-chain `tokenURI`.
      parameters:
        - name: artifactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: ERC-721 metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NftMetadata'
        '404':
          description: Artifact not found
  /artifacts/{id}/mint:
    get:
      tags: [nft]
      operationId: getArtifactMint
      summary: Get the recorded on-chain mint for a 1-of-1 artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Mint state (mint may be null if not yet minted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactMintState'
    post:
      tags: [nft]
      operationId: recordArtifactMint
      summary: Record an on-chain mint for a 1-of-1 artifact
      description: |
        Call this after deploying the `KannakaArtifact` contract and
        successfully calling its `mintArtifact(...)` function. Stores
        the chain id, contract address, tokenId, tx hash, and recipient
        so the storefront can surface the live NFT.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordMintBody'
      responses:
        '201':
          description: Mint recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactMintState'
        '409':
          description: Artifact is not a 1-of-1, or already minted
  /logout:
    post:
      tags: [Auth]
      operationId: logoutSession
      summary: Clear the current session cookie
      description: |
        Wallet sessions have no upstream IdP, so logout is just a server-side
        session-row delete + cookie clear. Idempotent.
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /admin/users:
    get:
      tags: [admin]
      operationId: listAdminUsers
      summary: List all users (admin only)
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAdminUsersResponse'

  /admin/users/{id}:
    patch:
      tags: [admin]
      operationId: updateAdminUser
      summary: Update a user's role or disabled status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminUserBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'

  /admin/reattribute-artifacts:
    post:
      tags: [admin]
      operationId: reattributeArtifacts
      summary: Re-link orphaned artifacts to their creators (admin only)
      parameters:
        - name: dryRun
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Reattribution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReattributeArtifactsResponse'

  /admin/obc/status:
    get:
      tags: [admin]
      operationId: getObcStatus
      summary: OBC integration health snapshot (admin only)
      responses:
        '200':
          description: Snapshot of partner key, webhook, and public probe state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObcStatusResponse'

  /admin/obc/replay:
    post:
      tags: [admin]
      operationId: replayObcEvents
      summary: Drain OBC /events/recent through the event dispatcher (admin only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObcReplayBody'
      responses:
        '200':
          description: Replay result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObcReplayResponse'
        '503':
          description: Partner API key not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents owned by the current user (or all for admins)
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Register an OpenBotCity agent by slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent slug not found on OpenBotCity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Agent already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /agents/{slug}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get an agent dashboard
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDashboard"

  /agents/{slug}/harvest:
    post:
      operationId: harvestAgent
      tags: [agents]
      summary: Run a partner harvest for a single agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HarvestAgentBody"
      responses:
        "200":
          description: Harvest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarvesterResult"

  /artifacts:
    get:
      operationId: listArtifacts
      tags: [artifacts]
      summary: List all artifacts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [raw, scored, narrated, dropped]
        - name: minScore
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: artifactType
          in: query
          schema:
            type: string
            enum: [image, audio, music, text, furniture]
        - name: editionType
          in: query
          schema:
            type: string
            enum: [open, limited, "1_of_1"]
        - name: agentId
          in: query
          schema:
            type: integer
        - name: all
          in: query
          description: Admin only. When `true`, returns data across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListResponse"

  /artifacts/{id}:
    get:
      operationId: getArtifact
      tags: [artifacts]
      summary: Get artifact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/score:
    post:
      operationId: scoreArtifact
      tags: [artifacts]
      summary: Run taste engine scoring on an artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scored artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/narrate:
    post:
      operationId: narrateArtifact
      tags: [artifacts]
      summary: Generate narrative for an artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Narrated artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /drops:
    get:
      operationId: listDrops
      tags: [drops]
      summary: List all drops
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, sold]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: all
          in: query
          description: Admin only. When `true`, returns data across all owners; otherwise scoped to the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: List of drops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropListResponse"
    post:
      operationId: createDrop
      tags: [drops]
      summary: Create a new drop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDropBody"
      responses:
        "201":
          description: Drop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"

  /drops/{id}:
    get:
      operationId: getDrop
      tags: [drops]
      summary: Get drop by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drop details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"
    patch:
      operationId: updateDrop
      tags: [drops]
      summary: Update a drop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDropBody"
      responses:
        "200":
          description: Drop updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"
    delete:
      operationId: deleteDrop
      tags: [drops]
      summary: Delete a drop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Drop deleted

  /drops/{id}/publish:
    post:
      operationId: publishDrop
      tags: [drops]
      summary: Publish a drop to the storefront
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drop published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"

  /drops/suggestions:
    get:
      operationId: getDropSuggestions
      tags: [drops]
      summary: Suggest drop bundles based on scarcity (limited-edition artifacts grouped by creator)
      responses:
        "200":
          description: Suggested drop bundles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropSuggestionsResponse"

  /drops/{dropId}/artifacts:
    post:
      operationId: addArtifactToDrop
      tags: [drops]
      summary: Add an artifact to a drop
      parameters:
        - name: dropId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddArtifactToDropBody"
      responses:
        "200":
          description: Artifact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drop"
        "409":
          description: Open-edition artifact rejected by scarce drop (pass force=true to override)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /drops/{dropId}/artifacts/{artifactId}:
    delete:
      operationId: removeArtifactFromDrop
      tags: [drops]
      summary: Remove an artifact from a drop
      parameters:
        - name: dropId
          in: path
          required: true
          schema:
            type: integer
        - name: artifactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Artifact removed

  /harvester/run:
    post:
      operationId: runHarvester
      tags: [harvester]
      summary: Trigger artifact harvesting from OpenBotCity
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HarvesterRunBody"
      responses:
        "200":
          description: Harvesting results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarvesterResult"

  /storefront/drops:
    get:
      operationId: getStorefrontDrops
      tags: [storefront]
      summary: Get published drops for the storefront
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Published drops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropListResponse"

  /storefront/drops/{id}:
    get:
      operationId: getStorefrontDrop
      tags: [storefront]
      summary: Get a single published drop for storefront
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published drop detail
          content:
            application/json:
              schema:
