name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    # Replit-ism: artifacts/mockup-sandbox/vite.config.ts hard-requires
    # PORT and BASE_PATH at config-load time. Locally the Replit shell
    # always sets them; CI doesn't. Inject stub defaults — the values
    # don't matter for `vite build`, only that they're present. Update
    # this block whenever a new Replit-only env var gets added to the
    # config gate (look for `throw new Error("X env var required")`).
    env:
      PORT: '5173'
      BASE_PATH: '/'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # preinstall guard exists in the root package.json — run install
        # via pnpm so the workspace catalog is honored. Not using
        # --frozen-lockfile yet: pnpm-workspace.yaml has a long list of
        # platform-stub overrides (esbuild, rollup, lightningcss,
        # @expo/ngrok-bin, @tailwindcss/oxide) that drifted out of sync
        # with the lockfile. Regenerating the lockfile + re-pinning
        # tracked separately; until then this would block every PR
        # for unrelated work. Re-enable --frozen-lockfile once the
        # overrides drift is resolved.
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build all packages
        run: pnpm run build
